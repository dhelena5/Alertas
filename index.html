<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alertas Tempranas — Inundaciones · Cuenca del Sinú</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111827; color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header h1 { font-size: 26px; font-weight: bold; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .header p { font-size: 13px; color: #9ca3af; margin-bottom: 16px; }
        .badge { padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .badge-purple { background: #7c3aed; }
        .badge-red { background: #dc2626; animation: pulse-badge 2s infinite; }
        @keyframes pulse-badge { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .alert { background: #7f1d1d; border-left: 4px solid #ef4444; padding: 14px; border-radius: 8px; margin-bottom: 20px; }
        .alert h3 { font-weight: bold; color: #fecaca; margin-bottom: 6px; font-size: 18px; }
        .alert p { font-size: 11px; color: #fca5a5; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { padding: 14px; border-radius: 8px; }
        .stat-card.red { background: #7f1d1d; }
        .stat-card.orange { background: #7c2d12; }
        .stat-card.blue { background: #1e3a8a; }
        .stat-card.cyan { background: #164e63; }
        .stat-card.yellow { background: #713f12; }
        .stat-card.green { background: #14532d; }
        .stat-label { font-size: 11px; margin-bottom: 6px; opacity: 0.8; }
        .stat-value { font-size: 22px; font-weight: bold; margin-bottom: 3px; }
        .stat-sub { font-size: 10px; opacity: 0.7; }
        .tabs { border-bottom: 2px solid #374151; margin-bottom: 20px; display: flex; gap: 6px; overflow-x: auto; }
        .tab { padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; color: #9ca3af; font-size: 13px; }
        .tab.active { border-bottom-color: #3b82f6; color: #60a5fa; }
        .tab:hover { color: #d1d5db; }
        .panel { background: #1f2937; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .panel h2 { font-size: 17px; font-weight: bold; margin-bottom: 14px; }
        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; background: #374151; color: white; }
        .btn:hover { background: #4b5563; transform: translateY(-1px); }
        .btn.active { background: #3b82f6; }
        .btn-group { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .satellite-viewer { background: #000; border-radius: 10px; overflow: hidden; position: relative; min-height: 350px; display: flex; align-items: center; justify-content: center; }
        .satellite-image { max-width: 100%; height: auto; display: block; }
        .image-label { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.85); padding: 6px 12px; border-radius: 6px; font-weight: bold; z-index: 5; font-size: 13px; }
        .comparison-container { position: relative; width: 100%; background: #000; border-radius: 10px; overflow: hidden; user-select: none; }
        .comparison-slider { position: absolute; top: 0; bottom: 0; width: 3px; background: #3b82f6; cursor: ew-resize; z-index: 10; box-shadow: 0 0 8px rgba(59, 130, 246, 0.6); }
        .comparison-slider::before { content: '⟷'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #3b82f6; padding: 6px 10px; border-radius: 50%; font-size: 16px; }
        .image-before { width: 100%; display: block; }
        .image-after-wrapper { position: absolute; top: 0; left: 0; height: 100%; overflow: hidden; }
        .image-after { height: 100%; display: block; }
        .legend-water { background: rgba(220, 38, 38, 0.15); border: 2px solid #dc2626; padding: 10px; border-radius: 6px; margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; }
        .legend-color { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }
        .info-box { background: rgba(30, 58, 138, 0.25); border: 1px solid #3b82f6; padding: 10px; border-radius: 6px; font-size: 11px; margin-top: 10px; line-height: 1.5; }
        .map-container { border-radius: 10px; height: 450px; position: relative; overflow: hidden; }
        #map { height: 100%; width: 100%; border-radius: 10px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .detail-card { background: #374151; padding: 10px; border-radius: 6px; }
        .detail-label { font-size: 10px; color: #9ca3af; margin-bottom: 3px; }
        .detail-value { font-size: 15px; font-weight: bold; }
        .risk-badge { padding: 7px; border-radius: 6px; text-align: center; font-weight: bold; margin-bottom: 12px; font-size: 13px; }
        .flood-zone { background: rgba(220, 38, 38, 0.25); padding: 6px; border-radius: 4px; margin: 3px 0; font-size: 10px; border-left: 3px solid #dc2626; }
        .flood-section { margin-top: 12px; margin-bottom: 12px; }
        .flood-section-title { font-size: 11px; color: #fca5a5; font-weight: bold; margin-bottom: 6px; }
        .chart { height: 220px; display: flex; align-items: flex-end; gap: 1px; margin-bottom: 12px; }
        .bar { flex: 1; background: #3b82f6; border-radius: 3px 3px 0 0; cursor: pointer; transition: background 0.15s; }
        .bar:hover { background: #60a5fa; }
        .timeline-item { background: #374151; padding: 10px; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .timeline-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
        .table { width: 100%; font-size: 12px; border-collapse: collapse; }
        .table th { background: #374151; padding: 7px; text-align: left; font-weight: 600; font-size: 11px; }
        .table td { padding: 7px; border-bottom: 1px solid #374151; }
        .table tr:hover { background: rgba(55, 65, 81, 0.5); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @media (max-width: 1024px) { .content-grid { grid-template-columns: 1fr; } }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #6b7280; padding: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        // Dashboard content placeholder
        document.getElementById('root').innerHTML = '<div style="padding: 20px; text-align: center;"><h1>Sistema de Alertas Tempranas</h1><p>Dashboard de inundaciones - Cuenca del Sinú</p></div>';
    </script>
</body>
</html>
